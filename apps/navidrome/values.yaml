replicaCount: 1

image:
  repository: deluan/navidrome
  tag: latest
  pullPolicy: IfNotPresent

service:
  # ClusterIP   → Access via Tailscale Serve (tunnel, double encryption, slower for large uploads)
  #              URL: http://<tailscale-hostname>:4533
  # NodePort    → Direct LAN access (no tunnel, faster for large uploads)
  #              URL: http://<lan-ip>:31433
  #              ⚠ Switch back to ClusterIP if you don't need direct LAN access
  type: NodePort
  port: 4533
  nodePort: 31433

storage:
  music:
    hostPath: /mnt/storage/music
    size: 100Gi

  data:
    hostPath: /mnt/storage/navidrome
    size: 5Gi

ingress:
  host: navidrome.lab.local

timezone: Asia/Kolkata
