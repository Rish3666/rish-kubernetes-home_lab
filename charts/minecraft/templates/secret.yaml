# ── Secret: RCON Password ────────────────────────────────────────────
# WHY IT EXISTS:
#   The itzg image uses RCON_PASSWORD to authenticate remote console access.
#   Storing passwords in environment variables or values.yaml exposes them in
#   plaintext. Kubernetes Secrets are base64-encoded and can be further encrypted
#   with encryption-at-rest (KMS). The Deployment references the Secret via
#   secretKeyRef, so the password is never in the YAML logs or manifests.
#
# HOW IT WORKS:
#   If .Values.rcon.password is set, we use it (base64-encoded).
#   If empty, Helm's randAlphaNum function generates a 16-char random string.
#   The generated password is printed in NOTES.txt for first access.
{{- if .Values.rcon.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "minecraft.fullname" . }}-rcon
  labels:
    {{- include "minecraft.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.rcon.password }}
  rcon-password: {{ .Values.rcon.password | b64enc }}
  {{- else }}
  rcon-password: {{ randAlphaNum 16 | b64enc }}
  {{- end }}
{{- end }}